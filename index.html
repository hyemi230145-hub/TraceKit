<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TraceKit</title>
  <meta name="description" content="Travel route journal — capture photos and trace your journey on a map." />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1A1714" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="header" id="header">
    <div class="logo">
      <span class="logo-dot"></span>TraceKit
    </div>
    <div class="header-right" id="headerRight">
      <button class="btn-primary" id="startBtn" onclick="App.startTrip()">Start Trip</button>
    </div>
  </header>

  <!-- ── MAIN LAYOUT ── -->
  <main class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-meta">
          <span class="label">Journey Log</span>
          <span class="photo-count" id="photoCount">0 photos</span>
        </div>
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
          <div class="upload-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </div>
          <div class="upload-text">
            <strong>Upload photos</strong>
            <span>Click or drag files here</span>
          </div>
        </div>
        <input type="file" id="fileInput" accept="image/*" multiple onchange="App.handleFiles(this.files)" />
      </div>

      <div class="timeline" id="timeline">
        <div class="empty-state" id="emptyState">
          <p>Start your trip and upload photos — your route will appear here.</p>
        </div>
      </div>
    </aside>

    <!-- Map -->
    <section class="map-wrap">
      <div id="map"></div>
      <div class="map-badge" id="mapBadge">No photos yet</div>
    </section>

  </main>

  <!-- ── PHOTO MODAL ── -->
  <div class="overlay" id="overlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <h2 id="modalTitle">Confirm photo details</h2>
        <button class="modal-close" onclick="App.closeModal()" aria-label="Close">✕</button>
      </div>
      <img class="modal-preview" id="modalPreview" src="" alt="Preview" />
      <div class="form-field">
        <label class="form-label">Date &amp; Time</label>
        <input class="form-input" id="modalTime" type="datetime-local" />
      </div>
      <div class="form-field">
        <label class="form-label">Location name</label>
        <input class="form-input" id="modalLocation" type="text" placeholder="e.g. Gyeongbokgung Palace" />
        <span class="form-hint" id="locationHint"></span>
      </div>
      <div class="form-field">
        <label class="form-label">GPS coordinates</label>
        <div class="coord-row">
          <input class="form-input" id="modalLat" type="number" placeholder="Latitude" step="0.0001" />
          <input class="form-input" id="modalLng" type="number" placeholder="Longitude" step="0.0001" />
        </div>
      </div>
      <div class="form-field">
        <label class="form-label">Memo <span class="optional">(optional)</span></label>
        <input class="form-input" id="modalMemo" type="text" placeholder="What happened here?" />
      </div>
      <div class="modal-actions">
        <button class="btn-ghost" onclick="App.closeModal()">Cancel</button>
        <button class="btn-primary" onclick="App.savePhoto()">Save to route</button>
      </div>
    </div>
  </div>

  <!-- ── NOTIFICATION ── -->
  <div class="notif" id="notif" role="alert" aria-live="polite">
    <span class="notif-icon" id="notifIcon"></span>
    <div>
      <div class="notif-title" id="notifTitle"></div>
      <div class="notif-body" id="notifBody"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/exifr@7.1.3/dist/lite.umd.js"></script>
  <script src="app.js"></script>
</body>
</html>
